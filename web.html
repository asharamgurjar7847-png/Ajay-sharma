<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      margin: auto;
    }

    nav h1 {
      font-size: 24px;
    }

    nav ul {
      list-style: none;
      display: flex;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
    }

    .hero {
      height: 90vh;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h2 {
      font-size: 40px;
    }

    .section {
      padding: 50px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #f4f4f4;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
    }

    @media(max-width: 768px) {
      nav {
        flex-direction: column;
      }
    }
  </style>
</head>

    </div>
  </section>

  <section class="section">
    <h2>Our Services</h2>
    <div class="cards">
      <div class="card">
        <h3>Design</h3>

      </div>
      <div class="card">
