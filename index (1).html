<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><b>Admission Enquiry</b></title>
    <style>
        body {
 background-color: lightyellow;
    font-family: Arial, sans-serif;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Contact Section */
        #contact {
            max-width: 500px;
            margin: 30px auto;
        }

        #contact form {
            border: 1px solid #ccc;
            padding: 20px;
        }

        #contact h2 {
            text-align: center;
        }

        /* Form Inputs */
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* Button Style */
        button {
            background-color: green;
            color: lightyellow;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        /* Footer Design */
        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <!-- Contact Section -->
    <section id="contact">
        <h2>Admission Enquiry</h2>
        <form>
            <input type="text" placeholder="Enter Name">
           <input type="text" placeholder="Father Name">

<div class="form-group">
                <label for="gender" > </label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <input type="text" placeholder="Mobile Number">
            <select>
                <option>Select Trade</option>
                <option>COPA</option>
                <option>Electrician</option>
               <option>Diesel Mechanic</option>
                <option>Fitter</option>
            </select>
            <textarea placeholder="Message"></textarea>
            <button type="submit">Submit</button>
        </form>
    </section> 
<marquee bgcolor="orange"> ~Admission Open For New Batch 2026 - 27~</marquee>

    <!-- Footer -->
    <footer>
        <p>Address: ITI Kotri, Rajasthan</p>
        <p>Copyright © 2026 ITI Kotri</p>
        <p>Designed by COPA Students</p>
    </footer>

</body>
</html>
